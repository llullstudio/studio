<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { background: var(--bg); padding: 1.5rem 2rem; margin: 0; display: flex; align-items: center; gap: 3rem; flex-wrap: wrap; }
    .divider { width: 1px; height: 48px; background: var(--border); }
    .note { font-family: var(--font-mono); font-size: 0.56rem; color: var(--text-faint); letter-spacing: 0.08em; line-height: 1.7; }
  </style>
</head>
<body>
  <div style="font-family:var(--font-grotesk);font-size:2rem;font-weight:600;letter-spacing:0.12em;color:var(--amber);">
    llUll <span style="font-family:var(--font-mono);font-weight:400;font-size:1.6rem;color:var(--text-dim);">studio</span>
  </div>
  <div class="divider"></div>
  <div style="font-family:var(--font-grotesk);font-size:1.1rem;font-weight:600;letter-spacing:0.12em;color:var(--amber);">
    llUll <span style="font-family:var(--font-mono);font-weight:400;color:var(--text-dim);">press</span>
  </div>
  <div class="divider"></div>
  <div class="note">
    Space Grotesk 600 · amber<br/>
    Suffix: JetBrains Mono 400 · text-dim<br/>
    Spacing: 0.12em · no icon
  </div>
</body>
</html>
