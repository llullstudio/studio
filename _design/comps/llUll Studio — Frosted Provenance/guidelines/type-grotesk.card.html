<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { background: var(--bg); padding: 1.5rem 2rem; margin: 0; display: flex; align-items: center; gap: 4rem; }
    .meta { font-family: var(--font-mono); font-size: 0.56rem; letter-spacing: 0.1em; color: var(--text-faint); }
  </style>
</head>
<body>
  <div style="font-family:var(--font-grotesk);font-size:2.2rem;font-weight:600;letter-spacing:0.12em;color:var(--amber);">
    llUll <span style="font-family:var(--font-mono);font-weight:400;color:var(--text-dim);font-size:1.8rem;">studio</span>
  </div>
  <div style="display:flex;flex-direction:column;gap:0.4rem;">
    <div style="font-family:var(--font-grotesk);font-size:1.1rem;font-weight:600;letter-spacing:0.12em;color:var(--amber);">llUll <span style="font-family:var(--font-mono);font-weight:400;color:var(--text-dim);">studio</span></div>
    <div style="font-family:var(--font-grotesk);font-size:0.85rem;font-weight:500;letter-spacing:0.12em;color:var(--amber);">llUll <span style="font-family:var(--font-mono);font-weight:400;color:var(--text-dim);">press</span></div>
  </div>
  <div class="meta">Space Grotesk 600<br/>letterSpacing 0.12em<br/>wordmark only</div>

</html>
