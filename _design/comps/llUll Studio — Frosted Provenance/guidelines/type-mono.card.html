<!-- @dsCard group="Type" viewport="700x220" name="JetBrains Mono" subtitle="Mono — labels, status, nav, metadata" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { background: var(--bg); padding: 1.5rem 2rem; margin: 0; }
    .stack { display: flex; flex-direction: column; gap: 0.85rem; }
    .specimen { display: flex; align-items: center; justify-content: space-between; }
    .sample { font-family: var(--font-mono); }
    .meta { font-family: var(--font-mono); font-size: 0.56rem; letter-spacing: 0.1em; color: var(--text-faint); white-space: nowrap; margin-left: 1rem; }
  </style>
</head>
<body>
  <div class="stack">
    <div class="specimen">
      <span class="sample" style="font-size:0.7rem;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-faint);">IMPRINTS</span>
      <span class="meta">500 · 0.7rem · section label</span>
    </div>
    <div class="specimen">
      <span class="sample" style="font-size:0.6rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--amber);border:1px solid var(--amber-dim);padding:0.25rem 0.55rem;">Active Build</span>
      <span class="meta">500 · 0.6rem · status badge</span>
    </div>
    <div class="specimen">
      <span class="sample" style="font-size:1.1rem;font-weight:600;letter-spacing:0.12em;color:var(--amber);">llUll <span style="font-weight:400;color:var(--text-dim);">studio</span></span>
      <span class="meta">600+400 · 1.1rem · wordmark</span>
    </div>
    <div class="specimen">
      <span class="sample" style="font-size:0.62rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-faint);">Gallery &nbsp;·&nbsp; Map &nbsp;·&nbsp; Substack</span>
      <span class="meta">400 · 0.62rem · nav</span>
    </div>
    <div class="specimen">
      <span class="sample" style="font-size:0.65rem;color:var(--text-dim);">rllull.substack.com <span style="color:var(--amber-dim);">→</span></span>
      <span class="meta">400 · 0.65rem · card link</span>
    </div>
  </div>
</body>
</html>
