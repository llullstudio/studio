<body>
  <div id="root"></div>

  <script type="text/babel">
    function App() {
      const [view, setView] = React.useState('lobby');

      const views = {
        lobby:   window.LobbyView,
        gallery: window.GalleryView,
        map:     window.MapView,
      };

      const ViewComponent = views[view] || window.LobbyView;

      return (
        <div style={{ display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
          <StudioHeader view={view} onNavigate={setView} />
          <ViewComponent />
          <StudioFooter />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
